<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %} Vivaantra {% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Work+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        .font-serif { font-family: 'Playfair Display', serif; }
        .font-sans { font-family: 'Work Sans', sans-serif; }
        .page-bg { background-color: #f8f5ef; }
    </style>
</head>
<body class="page-bg text-stone-950 font-sans min-h-screen">
    <header class="max-w-7xl mx-auto px-6 py-6 flex items-center justify-between">
        <a href="{{ url_for('home.html') }}" class="flex items-center gap-3">
            <img src="{{ url_for('static', filename='images/vivaantra-logo.svg') }}" alt="Vivaantra Logo" class="h-12 w-auto">
            <span class="text-lg font-semibold text-emerald-950">Vivaantra</span>
        </a>
        <nav class="flex items-center gap-8 text-sm font-medium text-stone-600">
            <a href="{{ url_for('home.html') }}" class="hover:text-emerald-800">Home</a>
            <a href="{{ url_for('about.html') }}" class="hover:text-emerald-800">About</a>
            <a href="{{ url_for('sessions.html') }}" class="hover:text-emerald-800">Sessions</a>
            <a href="https://calendar.app.google/eGNsh2DW9yzdyxXcA" class="bg-emerald-800 text-white px-5 py-2.5 rounded-full hover:bg-emerald-900 transition-all">Book Now</a>
        </nav>
    </header>
    <main>
        {% block content %}{% endblock %}
    </main>
</body>
</html>
